<div class="flex h-screen bg-gray-100 font-sans">

  <aside class="hidden md:flex flex-col w-64 bg-white border-r border-gray-200">
    <div class="flex items-center justify-center h-16 border-b border-gray-200">
      <span class="text-xl font-bold text-blue-600 tracking-wide">PODIUM <span class="text-gray-500 text-sm font-normal">Guardian</span></span>
    </div>

    <div class="flex-grow overflow-y-auto py-4">
      <nav class="space-y-1 px-2">
        
        <a routerLink="/guardian/dashboard" 
           routerLinkActive="bg-blue-50 text-blue-600" 
           class="group flex items-center px-4 py-3 text-sm font-medium text-gray-700 rounded-md hover:bg-gray-50 hover:text-gray-900 transition-colors">
          <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-gray-500 router-link-active:text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
          Dashboard
        </a>

        <a routerLink="/guardian/link-student" 
           routerLinkActive="bg-blue-50 text-blue-600" 
           class="group flex items-center px-4 py-3 text-sm font-medium text-gray-700 rounded-md hover:bg-gray-50 hover:text-gray-900 transition-colors">
          <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-gray-500 router-link-active:text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          Link Student
        </a>

        <a routerLink="/guardian/profile" 
           routerLinkActive="bg-blue-50 text-blue-600" 
           class="group flex items-center px-4 py-3 text-sm font-medium text-gray-700 rounded-md hover:bg-gray-50 hover:text-gray-900 transition-colors">
          <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-gray-500 router-link-active:text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          My Profile
        </a>

      </nav>
    </div>

    <div class="border-t border-gray-200 p-4">
      <button (click)="logout()" class="w-full flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-red-700 bg-red-50 hover:bg-red-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
        <svg class="mr-2 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="bg-white shadow-sm border-b border-gray-200 md:hidden flex items-center justify-between px-4 py-3">
      <span class="text-lg font-bold text-gray-800">Podium Guardian</span>
      <button (click)="toggleMobileMenu()" class="text-gray-500 focus:outline-none">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>
    </header>

    <div *ngIf="isMobileMenuOpen" class="md:hidden bg-white border-b border-gray-200">
      <nav class="px-2 pt-2 pb-3 space-y-1">
        <a routerLink="/guardian/dashboard" (click)="toggleMobileMenu()" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50">Dashboard</a>
        <a routerLink="/guardian/link-student" (click)="toggleMobileMenu()" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50">Link Student</a>
        <a routerLink="/guardian/profile" (click)="toggleMobileMenu()" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50">Profile</a>
        <button (click)="logout()" class="w-full text-left block px-3 py-2 rounded-md text-base font-medium text-red-600 hover:bg-red-50">Sign Out</button>
      </nav>
    </div>

    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
