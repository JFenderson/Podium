<div class="max-w-2xl mx-auto p-6 bg-white rounded-lg shadow mt-6">
  <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">My Profile & Settings</h2>

  <div *ngIf="message" [class]="'p-4 rounded mb-6 ' + (message.type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700')">
    {{ message.text }}
  </div>

  <div *ngIf="isLoading" class="text-center py-8">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
  </div>

  <form *ngIf="!isLoading" [formGroup]="profileForm" (ngSubmit)="onSubmit()">
    
    <div class="space-y-4 mb-8">
      <h3 class="text-lg font-semibold text-gray-700">Personal Information</h3>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
          <input type="text" formControlName="firstName" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
          <input type="text" formControlName="lastName" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <input type="email" formControlName="email" class="w-full bg-gray-100 border-gray-300 rounded-md shadow-sm text-gray-500 cursor-not-allowed">
        <p class="text-xs text-gray-400 mt-1">Contact support to change your email.</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
        <input type="tel" formControlName="phoneNumber" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
      </div>
    </div>

    <div class="space-y-4 mb-8">
      <h3 class="text-lg font-semibold text-gray-700">Notification Preferences</h3>
      
      <div class="flex items-center justify-between p-3 bg-gray-50 rounded border">
        <div>
          <p class="font-medium text-gray-900">Email Notifications</p>
          <p class="text-sm text-gray-500">Receive updates about offers and requests via email.</p>
        </div>
        <div class="flex items-center">
            <input type="checkbox" formControlName="emailNotificationsEnabled" class="h-5 w-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
        </div>
      </div>

      <div class="flex items-center justify-between p-3 bg-gray-50 rounded border">
        <div>
          <p class="font-medium text-gray-900">SMS Notifications</p>
          <p class="text-sm text-gray-500">Receive text alerts for urgent items (Standard rates apply).</p>
        </div>
        <div class="flex items-center">
            <input type="checkbox" formControlName="smsNotificationsEnabled" class="h-5 w-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
        </div>
      </div>
    </div>

    <div class="flex justify-end pt-4 border-t">
      <button type="button" class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 mr-3">
        Cancel
      </button>
      <button type="submit" [disabled]="profileForm.invalid || isSaving" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none disabled:opacity-50">
        {{ isSaving ? 'Saving...' : 'Save Changes' }}
      </button>
    </div>
  </form>
</div>
