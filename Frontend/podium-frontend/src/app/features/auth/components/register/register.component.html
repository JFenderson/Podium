<form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
<div class="mb-4">
  <label class="block text-gray-700 text-sm font-bold mb-2">Select Band</label>
  <select formControlName="bandId" class="shadow border rounded w-full py-2 px-3 text-gray-700">
    <option [ngValue]="null">Select a Band</option>
    @for (band of bands(); track band.id) {
      <option [value]="band.id">{{ band.bandName }}</option>
    }
  </select>
</div>

<div class="mb-4">
  <label class="block text-gray-700 text-sm font-bold mb-2">I am a...</label>
  <select formControlName="role" class="shadow border rounded w-full py-2 px-3 text-gray-700">
    <option value="">Select Role</option>
    @for (role of roles(); track role) {
      <option [value]="role">{{ role }}</option>
    }
  </select>
</div>
</form>
