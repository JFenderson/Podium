<div class="min-h-screen flex items-center justify-center bg-gray-100 py-12">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-lg">
    <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Create Account</h2>
    
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-gray-700 text-sm font-bold mb-2" for="firstName">First Name</label>
          <input type="text" id="firstName" formControlName="firstName"
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-gray-700 text-sm font-bold mb-2" for="lastName">Last Name</label>
          <input type="text" id="lastName" formControlName="lastName"
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="reg-email">Email Address</label>
        <input type="email" id="reg-email" formControlName="email"
          class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="reg-password">Password</label>
        <input type="password" id="reg-password" formControlName="password"
          class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
        <p class="text-xs text-gray-500 mt-1">Must be at least 8 characters long.</p>
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="role">I am a...</label>
        <select id="role" formControlName="role"
          class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
          <option value="Student">Student</option>
          <option value="Guardian">Guardian</option>
          <option value="Director">Director</option>
        </select>
      </div>

      <div *ngIf="showInstrumentField" class="mb-6 animate-fade-in">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="instrument">Instrument</label>
        <input type="text" id="instrument" formControlName="instrument" placeholder="e.g. Trumpet, Percussion"
          class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <button type="submit" [disabled]="registerForm.invalid || isSubmitting"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline disabled:opacity-50 disabled:cursor-not-allowed transition duration-150">
        {{ isSubmitting ? 'Creating Account...' : 'Register' }}
      </button>

    </form>

    <div class="mt-4 text-center">
      <p class="text-sm text-gray-600">
        Already have an account? 
        <a routerLink="/auth/login" class="text-blue-600 hover:underline">Sign in</a>
      </p>
    </div>
  </div>
</div>
