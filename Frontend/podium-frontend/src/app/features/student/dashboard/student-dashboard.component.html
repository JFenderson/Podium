<div class="container mx-auto px-4 py-8">
  <div class="bg-white rounded-lg shadow-md p-6 mb-6" *ngIf="profile">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold text-gray-800">{{ profile.firstName }} {{ profile.lastName }}</h1>
        <p class="text-gray-600">{{ profile.instrument }} • Class of {{ profile.graduationYear }}</p>
      </div>
      <button routerLink="/student/profile/edit" class="text-blue-600 hover:text-blue-800 font-medium">
        Edit Profile
      </button>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
      <div class="bg-blue-50 p-4 rounded-lg text-center border border-blue-100">
        <span class="block text-2xl font-bold text-blue-700">--</span>
        <span class="text-xs text-blue-600 uppercase font-semibold">Profile Views</span>
      </div>
      <div class="bg-green-50 p-4 rounded-lg text-center border border-green-100">
        <span class="block text-2xl font-bold text-green-700">--</span>
        <span class="text-xs text-green-600 uppercase font-semibold">Scholarship Offers</span>
      </div>
      <div class="bg-purple-50 p-4 rounded-lg text-center border border-purple-100">
        <span class="block text-2xl font-bold text-purple-700">{{ profile.gpa || 'N/A' }}</span>
        <span class="text-xs text-purple-600 uppercase font-semibold">GPA</span>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="bg-white rounded-lg shadow-md p-6">
      <h3 class="text-lg font-bold text-gray-800 mb-4">Quick Actions</h3>
      <div class="space-y-3">
        <a routerLink="/student/video-upload" class="block w-full text-center py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded transition">
          Upload New Video
        </a>
        <a routerLink="/student/my-offers" class="block w-full text-center py-3 px-4 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 rounded transition">
          View Scholarship Offers
        </a>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-md p-6">
      <h3 class="text-lg font-bold text-gray-800 mb-4">About Me</h3>
      <p class="text-gray-600 italic" *ngIf="profile?.bio">{{ profile?.bio }}</p>
      <p class="text-gray-400" *ngIf="!profile?.bio">No bio added yet.</p>
    </div>
  </div>
</div>
