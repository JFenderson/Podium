<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-md mt-6">
  <h2 class="text-2xl font-bold text-gray-800 mb-6">Upload Performance Video</h2>

  <form [formGroup]="uploadForm" (ngSubmit)="onSubmit()">
    
    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2" for="title">Title</label>
      <input type="text" id="title" formControlName="title" placeholder="e.g. Senior Recital - Spring 2024"
        class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <p *ngIf="uploadForm.get('title')?.touched && uploadForm.get('title')?.invalid" class="text-red-500 text-sm mt-1">
        Title is required.
      </p>
    </div>

    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2" for="description">Description</label>
      <textarea id="description" formControlName="description" rows="3"
        class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-gray-700 font-bold mb-2" for="instrument">Instrument</label>
        <input type="text" id="instrument" formControlName="instrument" placeholder="e.g. Trumpet"
          class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-gray-700 font-bold mb-2" for="category">Category</label>
        <select id="category" formControlName="category"
          class="w-full border rounded px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="Audition">Audition</option>
          <option value="Performance">Performance</option>
          <option value="Practice">Practice Session</option>
        </select>
      </div>
    </div>

    <div class="mb-6">
      <label class="block text-gray-700 font-bold mb-2">Video File</label>
      <div class="flex items-center justify-center w-full">
        <label for="dropzone-file" class="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100">
          <div class="flex flex-col items-center justify-center pt-5 pb-6" *ngIf="!selectedFile">
            <svg class="w-8 h-8 mb-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            <p class="mb-2 text-sm text-gray-500"><span class="font-semibold">Click to upload</span> or drag and drop</p>
            <p class="text-xs text-gray-500">MP4, MOV or AVI (MAX. 500MB)</p>
          </div>
          <div class="flex flex-col items-center justify-center pt-5 pb-6" *ngIf="selectedFile">
            <p class="text-lg text-gray-700 font-semibold">{{ selectedFile.name }}</p>
            <p class="text-sm text-gray-500">{{ (selectedFile.size / 1024 / 1024) | number:'1.1-2' }} MB</p>
          </div>
          <input id="dropzone-file" type="file" class="hidden" accept="video/*" (change)="onFileSelected($event)" [disabled]="isUploading" />
        </label>
      </div>
    </div>

    <div class="mb-6 flex items-center">
      <input id="isPublic" type="checkbox" formControlName="isPublic" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
      <label for="isPublic" class="ml-2 text-sm font-medium text-gray-900">Make this video visible to recruiters immediately</label>
    </div>

    <div *ngIf="isUploading" class="mb-6">
      <div class="flex justify-between mb-1">
        <span class="text-base font-medium text-blue-700">Uploading...</span>
        <span class="text-sm font-medium text-blue-700">{{ uploadProgress }}%</span>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-2.5">
        <div class="bg-blue-600 h-2.5 rounded-full transition-all duration-300 ease-out" [style.width.%]="uploadProgress"></div>
      </div>
      <p class="text-xs text-gray-500 mt-1" *ngIf="uploadProgress === 100">Finalizing processing, please wait...</p>
    </div>

    <button type="submit" 
      [disabled]="uploadForm.invalid || !selectedFile || isUploading"
      class="w-full text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 mr-2 mb-2 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed">
      {{ isUploading ? 'Uploading Video...' : 'Upload Video' }}
    </button>
  </form>
</div>
