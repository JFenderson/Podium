<!-- student-search.component.html - UPDATED WITH SAVED SEARCH INTEGRATION -->

<!-- MAIN CONTAINER -->
<div class="min-h-screen bg-gray-50 flex">
  
  <!-- FILTER SIDEBAR -->
  <aside 
    [class]="isSidebarCollapsed() ? 'w-16' : 'w-80'"
    class="bg-white border-r border-gray-200 transition-all duration-300 flex-shrink-0 overflow-y-auto sticky top-0 h-screen">
    
    <!-- Sidebar Header -->
    <div class="p-4 border-b border-gray-200 flex justify-between items-center">
      <h2 *ngIf="!isSidebarCollapsed()" class="font-bold text-gray-900">Filters</h2>
      <button
        (click)="isSidebarCollapsed.set(!isSidebarCollapsed())"
        class="p-2 hover:bg-gray-100 rounded-lg transition">
        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="isSidebarCollapsed() ? 'M9 5l7 7-7 7' : 'M15 19l-7-7 7-7'"></path>
        </svg>
      </button>
    </div>

    <div *ngIf="!isSidebarCollapsed()" class="p-4 space-y-4" [formGroup]="filterForm">
      
      <!-- Clear Filters -->
      <button
        *ngIf="appliedFiltersCount() > 0"
        (click)="clearAllFilters()"
        class="w-full text-sm text-red-600 hover:text-red-700 font-medium">
        Clear all filters ({{appliedFiltersCount()}})
      </button>

      <!-- INSTRUMENTS PANEL -->
      <div class="border border-gray-200 rounded-lg">
        <button
          (click)="toggleFilterPanel('instruments')"
          class="w-full px-4 py-3 flex justify-between items-center hover:bg-gray-50 transition">
          <span class="font-semibold text-gray-900">Instruments</span>
          <svg class="w-5 h-5 text-gray-400 transition-transform" [class.rotate-180]="isPanelExpanded('instruments')" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>
        
        <div *ngIf="isPanelExpanded('instruments')" class="px-4 pb-4 max-h-64 overflow-y-auto">
          <div class="space-y-2">
            <label *ngFor="let instrument of INSTRUMENTS" class="flex items-center">
              <input
                type="checkbox"
                [checked]="isInstrumentSelected(instrument)"
                (change)="toggleInstrument(instrument, $any($event.target).checked)"
                class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
              <span class="ml-2 text-sm text-gray-700">{{instrument}}</span>
            </label>
          </div>
        </div>
      </div>

      <!-- LOCATION PANEL -->
      <div class="border border-gray-200 rounded-lg">
        <button
          (click)="toggleFilterPanel('location')"
          class="w-full px-4 py-3 flex justify-between items-center hover:bg-gray-50">
          <span class="font-semibold text-gray-900">Location</span>
          <svg class="w-5 h-5 text-gray-400 transition-transform" [class.rotate-180]="isPanelExpanded('location')" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>
        
        <div *ngIf="isPanelExpanded('location')" class="px-4 pb-4 space-y-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">State</label>
            <div class="space-y-1 max-h-48 overflow-y-auto">
              <label *ngFor="let state of US_STATES" class="flex items-center">
                <input
                  type="checkbox"
                  [checked]="isStateSelected(state.code)"
                  (change)="toggleState(state.code, $any($event.target).checked)"
                  class="rounded border-gray-300 text-blue-600">
                <span class="ml-2 text-sm text-gray-700">{{state.name}}</span>
              </label>
            </div>
          </div>
          
          <label class="flex items-center">
            <input type="checkbox" formControlName="isHBCU" class="rounded border-gray-300 text-blue-600">
            <span class="ml-2 text-sm text-gray-700 font-medium">HBCU Programs Only</span>
          </label>
        </div>
      </div>

      <!-- Additional filter panels go here - academics, experience, etc. -->
      <!-- Use your existing filter panels from the original file -->

    </div>
  </aside>

  <!-- MAIN CONTENT AREA -->
  <main class="flex-1 overflow-y-auto">
    
    <!-- TOP HEADER BAR -->
    <div class="sticky top-0 bg-white border-b border-gray-200 z-20">
      <div class="px-6 py-4">
        
        <!-- Title & Actions Row -->
        <div class="flex items-center justify-between mb-4">
          <h1 class="text-2xl font-bold text-gray-900">Student Search</h1>
          
          <div class="flex items-center gap-3">
            <!-- NEW: Saved Searches Dropdown Component -->
            <app-saved-searches-dropdown
              (searchSelected)="onSavedSearchSelected($event)"
            ></app-saved-searches-dropdown>
            
            <!-- NEW: Save Current Search Button -->
            <button
              *ngIf="appliedFiltersCount() > 0"
              (click)="openSaveModal()"
              class="inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium">
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path>
              </svg>
              Save Search
            </button>
          </div>
        </div>

        <!-- Search Bar -->
        <div class="relative mb-4" [formGroup]="searchForm">
          <div class="relative">
            <input
              type="text"
              formControlName="searchTerm"
              placeholder="Search by name, school, or location..."
              class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <svg class="absolute left-3 top-3 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
        </div>

        <!-- Results Bar -->
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-4">
            <!-- Results Count -->
            <span class="text-sm text-gray-600">
              <span class="font-semibold text-gray-900">{{totalResults()}}</span> students found
            </span>
          </div>

          <!-- Sort Dropdown -->
          <div class="flex items-center gap-2" [formGroup]="filterForm">
            <label class="text-sm text-gray-600">Sort by:</label>
            <select 
              formControlName="sortBy" 
              (change)="performSearch()" 
              class="rounded-lg border-gray-300 text-sm pr-8">
              <option *ngFor="let opt of sortOptions" [value]="opt.value">{{opt.label}}</option>
            </select>
          </div>
        </div>

        <!-- Quick Filter Chips -->
        <div *ngIf="quickFilterChips().length > 0" class="mt-3 flex flex-wrap gap-2">
          <button
            *ngFor="let chip of quickFilterChips()"
            (click)="removeFilterChip(chip)"
            class="inline-flex items-center gap-1 px-3 py-1 bg-blue-50 text-blue-700 text-sm font-medium rounded-full hover:bg-blue-100 transition">
            {{chip.label}}
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- RESULTS AREA -->
    <div class="p-6">
      <!-- Loading State -->
      <div *ngIf="isLoading()" class="text-center py-12">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-200 border-t-blue-600 mx-auto"></div>
        <p class="text-gray-500 mt-4">Searching...</p>
      </div>

      <!-- Empty State -->
      <div *ngIf="!isLoading() && searchResults().length === 0" class="text-center py-12">
        <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <h3 class="text-lg font-semibold text-gray-900 mb-1">No students found</h3>
        <p class="text-gray-500">Try adjusting your filters or search term</p>
      </div>

      <!-- Student Cards Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <!-- Use your existing student card template here -->
        <div *ngFor="let student of searchResults()"
             (click)="viewStudentProfile(student.studentId)"
             class="bg-white rounded-xl border border-gray-200 overflow-hidden hover:shadow-lg transition cursor-pointer group relative">
          
          <!-- Watchlist Button -->
          <button
            (click)="toggleWatchlist(student.studentId, $event)"
            class="absolute top-3 right-3 p-2 bg-white rounded-full shadow-md hover:bg-gray-50 transition z-10">
            <svg 
              class="w-5 h-5" 
              [class.text-red-500]="isWatchlisted(student.studentId)"
              [class.text-gray-400]="!isWatchlisted(student.studentId)"
              [attr.fill]="isWatchlisted(student.studentId) ? 'currentColor' : 'none'"
              stroke="currentColor" 
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
            </svg>
          </button>

          <!-- Student Card Content - Use your existing template -->
          <div class="p-4">
            <h3 class="font-semibold text-lg">{{student.firstName}} {{student.lastName}}</h3>
            <p class="text-sm text-gray-600">{{student.primaryInstrument}}</p>
            <p class="text-xs text-gray-500 mt-1">{{student.city}}, {{student.state}}</p>
            <p class="text-xs text-gray-500">Class of {{student.graduationYear}}</p>
          </div>
        </div>
      </div>

      <!-- Pagination -->
      <div *ngIf="totalPages() > 1" class="mt-8 flex items-center justify-center gap-2">
        <button
          (click)="previousPage()"
          [disabled]="currentPage() === 1"
          class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
          Previous
        </button>
        
        <div class="flex gap-1">
          <button
            *ngFor="let page of [1, 2, 3, 4, 5]"
            (click)="goToPage(page)"
            [class.bg-blue-600]="currentPage() === page"
            [class.text-white]="currentPage() === page"
            [class.border-gray-300]="currentPage() !== page"
            class="px-4 py-2 border rounded-lg hover:bg-gray-50 transition">
            {{page}}
          </button>
        </div>

        <button
          (click)="nextPage()"
          [disabled]="currentPage() === totalPages()"
          class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
          Next
        </button>
      </div>
    </div>
  </main>
</div>

<!-- NEW: Save Search Modal Component -->
<app-save-search-modal
  [isOpen]="isSaveModalOpen()"
  [filters]="getCurrentFiltersForSave()"
  (close)="closeSaveModal()"
  (saved)="onSearchSaved()"
></app-save-search-modal>
