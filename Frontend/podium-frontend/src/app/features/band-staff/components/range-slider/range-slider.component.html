<div class="range-slider">
  <!-- Label -->
  <div *ngIf="label" class="flex items-center justify-between mb-2">
    <label class="text-sm font-medium text-gray-700">{{ label }}</label>
    <span class="text-sm text-gray-500">
      {{ formatDisplayValue(currentMin) }} - {{ formatDisplayValue(currentMax) }}
    </span>
  </div>

  <!-- Slider Container -->
  <div class="relative h-2 mb-4">
    <!-- Track Background -->
    <div class="absolute w-full h-2 bg-gray-200 rounded-full"></div>

    <!-- Active Range Track -->
    <div
      class="absolute h-2 bg-blue-600 rounded-full"
      [style.left.%]="getMinPercentage()"
      [style.width.%]="getMaxPercentage() - getMinPercentage()"
    ></div>

    <!-- Min Slider -->
    <input
      type="range"
      [min]="min"
      [max]="max"
      [step]="step"
      [value]="currentMin"
      (input)="onMinChange($event)"
      class="absolute w-full h-2 opacity-0 cursor-pointer z-10"
      style="pointer-events: auto;"
    />

    <!-- Max Slider -->
    <input
      type="range"
      [min]="min"
      [max]="max"
      [step]="step"
      [value]="currentMax"
      (input)="onMaxChange($event)"
      class="absolute w-full h-2 opacity-0 cursor-pointer z-10"
      style="pointer-events: auto;"
    />

    <!-- Min Thumb -->
    <div
      class="absolute w-4 h-4 bg-white border-2 border-blue-600 rounded-full shadow-md cursor-pointer transform -translate-y-1/4 z-20"
      [style.left.%]="getMinPercentage()"
      style="pointer-events: none;"
    ></div>

    <!-- Max Thumb -->
    <div
      class="absolute w-4 h-4 bg-white border-2 border-blue-600 rounded-full shadow-md cursor-pointer transform -translate-y-1/4 z-20"
      [style.left.%]="getMaxPercentage()"
      style="pointer-events: none;"
    ></div>
  </div>

  <!-- Min/Max Labels (optional detailed view) -->
  <div class="flex items-center justify-between text-xs text-gray-400 mt-1">
    <span>{{ formatDisplayValue(min) }}</span>
    <span>{{ formatDisplayValue(max) }}</span>
  </div>
</div>
