<div *ngIf="isOpen" class="fixed inset-0 z-50 overflow-y-auto">
  <!-- Backdrop -->
  <div class="fixed inset-0 bg-black bg-opacity-50 transition-opacity" (click)="closeModal()"></div>

  <!-- Modal -->
  <div class="flex min-h-full items-center justify-center p-4">
    <div class="relative bg-white rounded-lg shadow-xl max-w-md w-full p-6" (click)="$event.stopPropagation()">
      <!-- Header -->
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold text-gray-900">
          {{ editMode ? 'Edit Saved Search' : 'Save Search' }}
        </h3>
        <button
          type="button"
          (click)="closeModal()"
          class="text-gray-400 hover:text-gray-600 transition-colors"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-md">
        <p class="text-sm text-red-600">{{ errorMessage }}</p>
      </div>

      <!-- Form -->
      <form [formGroup]="saveForm" (ngSubmit)="onSubmit()">
        <!-- Name -->
        <div class="mb-4">
          <label for="searchName" class="block text-sm font-medium text-gray-700 mb-1">
            Search Name *
          </label>
          <input
            id="searchName"
            type="text"
            formControlName="name"
            placeholder="e.g., Top Trumpet Players in Alabama"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            [class.border-red-500]="name?.invalid && name?.touched"
          />
          <p *ngIf="name?.invalid && name?.touched" class="mt-1 text-sm text-red-600">
            <span *ngIf="name?.errors?.['required']">Search name is required</span>
            <span *ngIf="name?.errors?.['maxlength']">Name must be less than 100 characters</span>
          </p>
        </div>

        <!-- Description -->
        <div class="mb-4">
          <label for="searchDescription" class="block text-sm font-medium text-gray-700 mb-1">
            Description (Optional)
          </label>
          <textarea
            id="searchDescription"
            formControlName="description"
            rows="3"
            placeholder="Add notes about this search..."
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
            [class.border-red-500]="description?.invalid && description?.touched"
          ></textarea>
          <p *ngIf="description?.invalid && description?.touched" class="mt-1 text-sm text-red-600">
            Description must be less than 500 characters
          </p>
        </div>

        <!-- Email Alerts -->
        <div class="mb-4">
          <div class="flex items-center mb-2">
            <input
              id="alertsEnabled"
              type="checkbox"
              formControlName="alertsEnabled"
              class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
            />
            <label for="alertsEnabled" class="ml-2 text-sm font-medium text-gray-700">
              Email me when new students match this search
            </label>
          </div>

          <!-- Alert Frequency -->
          <div *ngIf="alertsEnabled?.value" class="ml-6 mt-2">
            <label class="block text-sm text-gray-600 mb-1">Alert Frequency</label>
            <div class="space-y-2">
              <div *ngFor="let option of alertFrequencyOptions" class="flex items-center">
                <input
                  type="radio"
                  [id]="'freq-' + option.value"
                  [value]="option.value"
                  formControlName="alertFrequencyDays"
                  class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500"
                />
                <label [for]="'freq-' + option.value" class="ml-2 text-sm text-gray-700">
                  {{ option.label }}
                </label>
              </div>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-3 mt-6">
          <button
            type="button"
            (click)="closeModal()"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors"
            [disabled]="isSubmitting"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            [disabled]="isSubmitting || saveForm.invalid"
          >
            <span *ngIf="!isSubmitting">{{ editMode ? 'Update' : 'Save' }} Search</span>
            <span *ngIf="isSubmitting" class="flex items-center">
              <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Saving...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
