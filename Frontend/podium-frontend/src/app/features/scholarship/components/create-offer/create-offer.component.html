<div class="container mx-auto px-4 py-8 max-w-2xl">
  <div class="bg-white rounded-lg shadow-lg overflow-hidden">
    <div class="bg-blue-600 px-6 py-4">
      <h2 class="text-xl font-bold text-white">Create Scholarship Offer</h2>
    </div>

    <form [formGroup]="offerForm" (ngSubmit)="onSubmit()" class="p-6 space-y-6">
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Student ID</label>
        <input type="number" formControlName="studentId" 
               class="w-full px-4 py-2 border rounded-md focus:ring-blue-500 focus:border-blue-500"
               placeholder="Enter Student ID">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Amount ($)</label>
          <div class="relative">
            <span class="absolute left-3 top-2 text-gray-500">$</span>
            <input type="number" formControlName="scholarshipAmount" 
                   class="w-full pl-8 pr-4 py-2 border rounded-md focus:ring-blue-500 focus:border-blue-500"
                   placeholder="0.00">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Offer Type</label>
          <input type="text" formControlName="offerType" 
                 class="w-full px-4 py-2 border rounded-md focus:ring-blue-500 focus:border-blue-500"
                 placeholder="e.g. Tuition, Housing, Book Stipend">
          <p class="text-xs text-gray-500 mt-1">Specify the category of this offer.</p>
        </div>
      </div>

      <div class="flex items-center space-x-2">
        <input type="checkbox" formControlName="requiresGuardianApproval" id="reqGuard"
               class="rounded text-blue-600 focus:ring-blue-500 h-4 w-4">
        <label for="reqGuard" class="text-sm text-gray-700">Require Guardian Signature?</label>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description / Notes</label>
        <textarea formControlName="description" rows="3" 
                  class="w-full px-4 py-2 border rounded-md focus:ring-blue-500 focus:border-blue-500"
                  placeholder="Enter a personal message or details..."></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Terms & Conditions</label>
        <textarea formControlName="terms" rows="3" 
                  class="w-full px-4 py-2 border rounded-md focus:ring-blue-500 focus:border-blue-500"
                  placeholder="GPA requirements, participation rules..."></textarea>
      </div>

      <div class="flex justify-end space-x-3 pt-4 border-t">
        <button type="button" routerLink="/dashboard" 
                class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
          Cancel
        </button>
        <button type="submit" 
                [disabled]="offerForm.invalid || isSubmitting"
                class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 flex items-center">
          <span *ngIf="isSubmitting" class="mr-2 animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></span>
          Send Offer
        </button>
      </div>
    </form>
  </div>
</div>
