<div class="flex h-screen bg-gray-100">
  <aside class="w-64 bg-gray-800 text-white flex flex-col transition-all duration-300">
    <div class="p-4 bg-gray-900 flex items-center justify-between">
      <span class="text-xl font-bold tracking-wider">PODIUM</span>
    </div>

    <nav class="flex-1 overflow-y-auto py-4">
      <ul class="space-y-2 px-2">
        <li>
          <a routerLink="/dashboard" routerLinkActive="bg-gray-700 text-blue-400" 
             class="block px-4 py-2 rounded hover:bg-gray-700 transition">
            Dashboard
          </a>
        </li>

        <li *ngIf="hasRole('Director')">
          <a routerLink="/director/staff" routerLinkActive="bg-gray-700 text-blue-400" 
             class="block px-4 py-2 rounded hover:bg-gray-700 transition">
            Manage Staff
          </a>
        </li>

        <li *ngIf="hasRole('Student')">
          <a routerLink="/student/my-videos" routerLinkActive="bg-gray-700 text-blue-400" 
             class="block px-4 py-2 rounded hover:bg-gray-700 transition">
            My Videos
          </a>
        </li>
      </ul>
    </nav>

    <div class="p-4 bg-gray-900 border-t border-gray-700">
      <div *ngIf="currentUser$ | async as user" class="mb-2">
        <p class="text-sm font-medium">{{ user.email }}</p>
        <p class="text-xs text-gray-400 capitalize">{{ user.role }}</p>
      </div>
      <button (click)="logout()" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded text-sm transition">
        Logout
      </button>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto">
    <header class="bg-white shadow p-4 flex justify-between items-center sticky top-0 z-10">
      <h1 class="text-lg font-semibold text-gray-700">Podium Dashboard</h1>
      </header>
    <div class="p-6">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
