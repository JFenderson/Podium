<header class="bg-white border-b border-border h-16 flex items-center justify-between px-4 lg:px-6">
  
  <div class="flex items-center gap-4">
    <button class="lg:hidden p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-md">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

    <h2 class="text-xl font-semibold text-gray-800 hidden sm:block">
      Podium
    </h2>
  </div>

  <div class="flex items-center gap-4">
    <div class="flex items-center gap-3">
      <div class="text-right hidden md:block">
        <p class="text-sm font-medium text-gray-900">{{ (currentUser$ | async)?.firstName }} {{ (currentUser$ | async)?.lastName }}</p>
        <p class="text-xs text-gray-500">{{ (currentUser$ | async)?.roles?.[0] }}</p>
      </div>
      
      <div class="h-8 w-8 rounded-full bg-primary-100 text-primary-700 flex items-center justify-center font-bold border border-primary-200">
        {{ (currentUser$ | async)?.firstName?.charAt(0) }}
      </div>
    </div>
  </div>
</header>
