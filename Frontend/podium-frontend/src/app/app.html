<div class="flex h-screen bg-background text-text-primary font-sans overflow-hidden">
  
  @if (isAuthenticated()) {
    <app-sidebar class="hidden md:block w-64 flex-shrink-0 h-full overflow-y-auto border-r border-border bg-surface"></app-sidebar>
  }

  <div class="flex flex-col flex-1 min-w-0 overflow-hidden">
   
    @if (isAuthenticated()) {
      <app-header class="flex-shrink-0 z-10"></app-header>
    }
    
    <main class="flex-1 overflow-y-auto bg-background relative"
          [class.p-4]="isAuthenticated()"
          [class.md:p-6]="isAuthenticated()">
      
      <div [class.max-w-7xl]="isAuthenticated()" 
           [class.mx-auto]="isAuthenticated()"
           [class.w-full]="!isAuthenticated()"
           [class.h-full]="!isAuthenticated()">
        
        <router-outlet></router-outlet>
        
        <app-toast-container />
      </div>

      @if (!isAuthenticated()) {
        <app-footer></app-footer>
      }
    </main>

    @if (isAuthenticated()) {
      <app-footer class="flex-shrink-0"></app-footer>
    }
  </div>
</div>
