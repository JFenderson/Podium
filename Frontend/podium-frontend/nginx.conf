# Main nginx configuration for Angular application
events {
    # Maximum number of simultaneous connections per worker process
    worker_connections 1024;
}

http {
    # Include MIME types for proper content type handling
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging configuration
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Enable gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    server {
        # Listen on port 80
        listen 80;
        server_name localhost;

        # Root directory where Angular files are served from
        root /usr/share/nginx/html;
        index index.html;

        # Handle Angular routing - try files in order:
        # 1. Check if the exact file exists
        # 2. Check if directory exists
        # 3. Fall back to index.html for Angular to handle routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets for better performance
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Don't cache index.html to ensure latest version is always served
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires 0;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Error pages
        error_page 404 /index.html;
    }
}
